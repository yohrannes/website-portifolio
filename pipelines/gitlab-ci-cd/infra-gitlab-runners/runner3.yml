---

oci-oke-auth:
  tags:
    - runner2
  stage: check-infra
  extends: .oci-oke-auth

delete-old-runner:
  stage: check-infra
  tags:
    - runner2
  script:
    - |
      RUNNERS=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_TOKEN_RUNNER_ADMIN" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/runners")
      
      RUNNER_ID=$(echo "$RUNNERS" | jq -r '.[] | select(.description == "oke-k8s-runner") | .id')
      
      if [ -z "$RUNNER_ID" ] || [ "$RUNNER_ID" = "null" ]; then
        echo "No runner found with description 'oke-k8s-runner'"
        exit 0
      fi
      
      echo "Found runner ID: $RUNNER_ID"
      
      HTTP_CODE=$(curl -s --output /dev/null --write-out "%{http_code}" \
        --request DELETE \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN_RUNNER_ADMIN" \
        "https://gitlab.com/api/v4/runners/$RUNNER_ID")
      
      if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
        echo "Runner deleted successfully"
      else
        echo "Failed to delete runner. HTTP code: $HTTP_CODE"
        exit 1
      fi

create-runner:
  stage: check-infra
  tags:
    - runner2
  needs:
    - delete-old-runner
  script:
    - |
      RESPONSE=$(curl -s --request POST --url "https://gitlab.com/api/v4/user/runners" \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN_RUNNER_ADMIN" \
        --data "runner_type=project_type" \
        --data "project_id=$CI_PROJECT_ID" \
        --data "tag_list=runner3" \
        --data "description=oke-k8s-runner" \
        --data "run_untagged=true")
      RUNNER_TOKEN=$(echo "$RESPONSE" | jq -r '.token')
      if [ -z "$RUNNER_TOKEN" ] || [ "$RUNNER_TOKEN" = "null" ]; then
        echo "Failed to create runner"
        echo "$RESPONSE"
        exit 1
      fi
      curl -s --header "PRIVATE-TOKEN: $GL_TOKEN_VARS_ADMIN" \
        --request PUT \
        --form "value=$RUNNER_TOKEN" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/GITLAB_RUNNER3_TOKEN_CREATED"

deploy-runner:
  stage: check-infra
  tags:
    - runner2
  extends: .oci-oke-auth
  needs:
    - create-runner
    - oci-oke-auth
  script:
    - |
      rm -f $HOME/.kube/config
      oci ce cluster create-kubeconfig \
        --cluster-id $PROD_WEBAPP_CLUSTER_ID \
        --file $HOME/.kube/config \
        --token-version 2.0.0 \
        --kube-endpoint PUBLIC_ENDPOINT \
        --profile DEFAULT
      
      RUNNER_TOKEN=$(curl -s --header "PRIVATE-TOKEN: $GL_TOKEN_VARS_ADMIN" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/GITLAB_RUNNER3_TOKEN_CREATED" \
        | jq -r '.value')
      
      kubectl create namespace gitlab-runner || true
      kubectl delete secret gitlab-runner-secret -n gitlab-runner --ignore-not-found
      kubectl create secret generic gitlab-runner-secret \
        --namespace gitlab-runner \
        --from-literal=runner-token="$RUNNER_TOKEN" \
        --from-literal=runner-registration-token=""
      
      kubectl apply -f kubernetes/gitlab-runner/cluster-role-binding.yaml
      
      sed -i "s/OCI_NAMESPACE_PLACEHOLDER/$OCI_NAMESPACE/g" kubernetes/gitlab-runner/values-new.yaml

      helm repo add gitlab https://charts.gitlab.io
      helm repo update gitlab
      helm upgrade --install gitlab-runner gitlab/gitlab-runner \
        --namespace gitlab-runner \
        -f kubernetes/gitlab-runner/values-new.yaml
