.oci-oke-auth:
  stage: check-infra
  needs:
    - get-webapp-compartment
  tags:
    - runner2
  before_script:
    - docker pull ghcr.io/oracle/oci-cli:20251210
    - docker tag ghcr.io/oracle/oci-cli:20251210 oci
    - export OCI_CONFIG="$(echo $OCI_CONFIG_BASE64 | base64 -d)"
    - export OCI_PRIVATE_KEY="$(echo $OCI_PRIVATE_KEY_BASE64 | base64 -d)"
    - mkdir -p $HOME/.kube
    - chmod 700 $HOME/.kube
    - echo > $HOME/.kube/config
    - |
      whoami
      pwd
      cat > $HOME/.kube/config << 'EOF'
      apiVersion: v1
      kind: Config
      clusters:
      users:
      contexts:
      EOF
    - |
      oci() {
        docker run --rm -i \
          --user root \
          -e OCI_CONFIG="$OCI_CONFIG" \
          -e OCI_PRIVATE_KEY="$OCI_PRIVATE_KEY" \
          -e OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True \
          -v "$HOME/.kube:/oracle/.kube:rw" \
          --entrypoint /bin/sh \
          oci \
          -c "mkdir -p ~/.oci && \
              echo \"\$OCI_CONFIG\" > ~/.oci/config && \
              echo \"\$OCI_PRIVATE_KEY\" > ~/.oci/oci_api_key.pem && \
              chmod 600 ~/.oci/oci_api_key.pem && \
              exec oci \"\$@\"" -- "$@"
      }
#              dnf install -y git && \
## k() ... removed --rm for tests update it after..
    - |
      k() {
        docker run -i \
          --user root \
          -e OCI_CONFIG="$OCI_CONFIG" \
          -e OCI_PRIVATE_KEY="$OCI_PRIVATE_KEY" \
          -e OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True \
          -e KUBECONFIG="/oracle/.kube/config" \
          -v "$HOME/.kube:/oracle/.kube:rw" \
          -v "/usr/local/bin/kubectl:/usr/local/bin/kubectl:ro" \
          --entrypoint /bin/sh \
          oci \
          -c "mkdir -p ~/.oci && \
              echo \"\$OCI_CONFIG\" > ~/.oci/config && \
              echo \"\$OCI_PRIVATE_KEY\" > ~/.oci/oci_api_key.pem && \
              chmod 600 ~/.oci/oci_api_key.pem && \
              dnf install -y git && \
              exec /usr/local/bin/kubectl \"\$@\"" -- "$@"
      }
# Check oci authentication
    - |
      oci iam user get \
        --user-id $(oci iam user list \
        --query "data[0].id" \
        --raw-output 2>/dev/null) --output json 2>/dev/null | jq -r .data.name > /home/gitlab-runner/oci-log.txt
 
  script:
    - |
      oci ce cluster create-kubeconfig \
        --cluster-id $PROD_WEBAPP_CLUSTER_ID \
        --file /oracle/.kube/config \
        --token-version 2.0.0 \
        --kube-endpoint PUBLIC_ENDPOINT \
        --profile DEFAULT
    - k version --client
#    - k get namespaces 
#    - k get componentstatuses