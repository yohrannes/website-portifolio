---

.oke-runner-base:
  tags:
    - runner3
  stage: test
  image: alpine:latest

check-node-architecture:
  extends: .oke-runner-base
  script:
    - uname -a
    - lscpu
    - echo "Verifying ARM64 architecture..."
    - if [ "$(uname -m)" != "aarch64" ]; then echo "FAILED: Not running on ARM64"; exit 1; fi

resource-benchmark:
  extends: .oke-runner-base
  script:
    - apk add --no-cache sysbench
    - echo "Running CPU benchmark (ARM64 Optimized)..."
    - sysbench cpu --cpu-max-prime=20000 run
    - echo "Running Memory benchmark..."
    - sysbench memory run

network-connectivity:
  extends: .oke-runner-base
  script:
    - apk add --no-cache curl bind-tools
    - echo "Testing DNS resolution..."
    - nslookup google.com
    - echo "Testing Outbound Connectivity..."
    - curl -I https://www.oracle.com
    - echo "Testing connectivity to Runner2 (GCP) if IP is available..."
    - if [ ! -z "$PROD_RUNNER2_IP" ]; then ping -c 4 $PROD_RUNNER2_IP; fi

storage-provisioning-test:
  extends: .oke-runner-base
  image: bitnami/kubectl:latest
  script:
    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: storage-test-pvc
        namespace: gitlab-runner
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: oci-bv # Standard OKE block volume storage class
      EOF
    - echo "Waiting for PVC to be bound..."
    - |
      for i in {1..20}; do
        STATUS=$(kubectl get pvc storage-test-pvc -n gitlab-runner -o jsonpath='{.status.phase}')
        if [ "$STATUS" = "Bound" ]; then
          echo "PVC Bound successfully!"
          break
        fi
        echo "Current status: $STATUS. Waiting..."
        sleep 10
      done
      if [ "$STATUS" != "Bound" ]; then
        echo "FAILED: PVC did not bind in time."
        kubectl describe pvc storage-test-pvc -n gitlab-runner
        exit 1
      fi
    - echo "Cleaning up..."
    - kubectl delete pvc storage-test-pvc -n gitlab-runner

cluster-autoscaler-check:
  extends: .oke-runner-base
  image: bitnami/kubectl:latest
  script:
    - echo "Checking if Cluster Autoscaler is deployed..."
    - kubectl get pods -n kube-system | grep cluster-autoscaler || echo "Autoscaler not found in kube-system"
    - echo "Node count:"
    - kubectl get nodes
