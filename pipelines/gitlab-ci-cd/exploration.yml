---

.oke-runner-base:
  tags:
    - runner3
  stage: test
  image: docker.io/library/alpine:latest

check-node-architecture:
  extends: .oke-runner-base
  script:
    - uname -a
    - echo "Verifying ARM64 architecture..."
    - |
      set +x
      if [ "$(uname -m)" != "aarch64" ]; then 
        echo "FAILED: Not running on ARM64"
        exit 1
      fi

resource-benchmark:
  extends: .oke-runner-base
  script:
    - |
      set +x
      apk add --no-cache sysbench > /dev/null
      echo "Running CPU benchmark (ARM64 Optimized)..."
      sysbench cpu --cpu-max-prime=20000 run > /dev/null
      echo "Running Memory benchmark..."
      sysbench memory run > /dev/null
      echo "Resource benchmark completed successfully."

network-connectivity:
  extends: .oke-runner-base
  script:
    - |
      set +x
      apk add --no-cache curl bind-tools > /dev/null
      echo "Testing network services..."
      nslookup google.com > /dev/null && echo "- DNS resolution: OK"
      curl -sI https://www.oracle.com > /dev/null && echo "- Internet egress: OK"
      if [ ! -z "$PROD_RUNNER2_IP" ]; then 
        ping -c 2 $PROD_RUNNER2_IP > /dev/null && echo "- Multi-cloud connectivity: OK"
      fi

object-storage-connectivity-test:
  extends: .oke-runner-base
  script:
    - |
      set +x
      echo "Testing OCI Object Storage access..."
      apk add --no-cache curl > /dev/null
      # Using variable to hide namespace from public logs and code
      curl -sI https://${OCI_NAMESPACE}.compat.objectstorage.us-ashburn-1.oraclecloud.com > /dev/null
      echo "Connectivity to Object Storage verified."

cluster-autoscaler-check:
  extends: .oke-runner-base
  image: docker.io/bitnami/kubectl:latest
  script:
    - |
      set +x
      echo "Auditing cluster state..."
      kubectl get pods -n kube-system | grep cluster-autoscaler > /dev/null || echo "- Autoscaler: Not detected (expected for current quota)"
      NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
      echo "- Active worker nodes: $NODE_COUNT"
      echo "Cluster state audit completed."
