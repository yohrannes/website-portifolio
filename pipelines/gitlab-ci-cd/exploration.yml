---

.oke-runner-base:
  tags:
    - runner3
  stage: test
  image: docker.io/library/alpine:latest

check-node-architecture:
  extends: .oke-runner-base
  script:
    - uname -a
    - echo "Verifying ARM64 architecture..."
    - |
      if [ "$(uname -m)" != "aarch64" ]; then 
        echo "FAILED: Not running on ARM64"
        exit 1
      fi

resource-benchmark:
  extends: .oke-runner-base
  script:
    - apk add --no-cache sysbench
    - echo "Running CPU benchmark (ARM64 Optimized)..."
    - sysbench cpu --cpu-max-prime=20000 run
    - echo "Running Memory benchmark..."
    - sysbench memory run

network-connectivity:
  extends: .oke-runner-base
  script:
    - apk add --no-cache curl bind-tools
    - echo "Testing DNS resolution..."
    - nslookup google.com
    - echo "Testing Outbound Connectivity..."
    - curl -I https://www.oracle.com
    - echo "Testing connectivity to Runner2 (GCP) if IP is available..."
    - |
      if [ ! -z "$PROD_RUNNER2_IP" ]; then 
        ping -c 4 $PROD_RUNNER2_IP
      fi

object-storage-connectivity-test:
  extends: .oke-runner-base
  image: docker.io/library/alpine:latest
  script:
    - echo "Testing connectivity to OCI Object Storage (Cache Endpoint)..."
    - apk add --no-cache curl
    - # Testing connectivity to the S3 compatibility endpoint
    - curl -vI https://idgpfu0abvtk.compat.objectstorage.us-ashburn-1.oraclecloud.com
    - echo "Connectivity test successful."


cluster-autoscaler-check:
  extends: .oke-runner-base
  image: docker.io/bitnami/kubectl:latest
  script:
    - echo "Checking if Cluster Autoscaler is deployed..."
    - |
      kubectl get pods -n kube-system | grep cluster-autoscaler || echo "Autoscaler not found in kube-system"
    - echo "Node count:"
    - kubectl get nodes
