---

.oke-runner-base:
  tags:
    - runner3
  stage: test
  image: docker.io/library/alpine:latest

check-node-architecture:
  extends: .oke-runner-base
  script:
    - uname -a
    - echo "Verifying ARM64 architecture..."
    - |
      if [ "$(uname -m)" != "aarch64" ]; then 
        echo "FAILED: Not running on ARM64"
        exit 1
      fi

resource-benchmark:
  extends: .oke-runner-base
  script:
    - apk add --no-cache sysbench
    - echo "Running CPU benchmark (ARM64 Optimized)..."
    - sysbench cpu --cpu-max-prime=20000 run
    - echo "Running Memory benchmark..."
    - sysbench memory run

network-connectivity:
  extends: .oke-runner-base
  script:
    - apk add --no-cache curl bind-tools
    - echo "Testing DNS resolution..."
    - nslookup google.com
    - echo "Testing Outbound Connectivity..."
    - curl -I https://www.oracle.com
    - echo "Testing connectivity to Runner2 (GCP) if IP is available..."
    - |
      if [ ! -z "$PROD_RUNNER2_IP" ]; then 
        ping -c 4 $PROD_RUNNER2_IP
      fi

storage-provisioning-test:
  extends: .oke-runner-base
  image: docker.io/bitnami/kubectl:latest
  script:
    - echo "Starting Storage Test (OCI Always Free compliance)..."
    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: storage-test-pvc-v2
        namespace: gitlab-runner
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: oci-bv
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: storage-consumer-pod
        namespace: gitlab-runner
      spec:
        containers:
        - name: app
          image: docker.io/library/alpine:latest
          command: ["sh", "-c", "echo 'Volume works!' > /data/test.txt && sleep 30"]
          volumeMounts:
          - name: data
            mountPath: /data
        volumes:
        - name: data
          persistentVolumeClaim:
            claimName: storage-test-pvc-v2
      EOF
    - echo "Waiting for Pod and PVC to be ready..."
    - |
      for i in $(seq 1 30); do
        PVC_STATUS=$(kubectl get pvc storage-test-pvc-v2 -n gitlab-runner -o jsonpath='{.status.phase}')
        POD_STATUS=$(kubectl get pod storage-consumer-pod -n gitlab-runner -o jsonpath='{.status.phase}')
        echo "PVC: $PVC_STATUS | Pod: $POD_STATUS"
        if [ "$PVC_STATUS" = "Bound" ] && [ "$POD_STATUS" = "Running" ]; then
          echo "SUCCESS: Volume provisioned and Pod is running!"
          break
        fi
        sleep 10
      done
      if [ "$PVC_STATUS" != "Bound" ]; then
        echo "FAILED: Storage test failed."
        kubectl describe pvc storage-test-pvc-v2 -n gitlab-runner
        kubectl describe pod storage-consumer-pod -n gitlab-runner
        exit 1
      fi
    - echo "Cleaning up..."
    - kubectl delete pod storage-consumer-pod -n gitlab-runner
    - kubectl delete pvc storage-test-pvc-v2 -n gitlab-runner

cluster-autoscaler-check:
  extends: .oke-runner-base
  image: docker.io/bitnami/kubectl:latest
  script:
    - echo "Checking if Cluster Autoscaler is deployed..."
    - |
      kubectl get pods -n kube-system | grep cluster-autoscaler || echo "Autoscaler not found in kube-system"
    - echo "Node count:"
    - kubectl get nodes
