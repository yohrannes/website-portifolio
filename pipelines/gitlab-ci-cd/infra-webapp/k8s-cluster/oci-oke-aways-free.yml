---
include:
  - local: 'pipelines/gitlab-ci-cd/terraform/trigger-run.yml'
  - local: 'pipelines/gitlab-ci-cd/terraform/apply.yml'

variables:
  TF_WORKSPACE: "webapp_prod"
  TF_TARGET_ADDRS: 'module.webapp'

trigger-terraform-run:
  stage: tf-run
  extends:
    - .trigger-terraform-run

terraform-apply:
  stage: tf-apply
  extends: .terraform-apply
  needs:
    - trigger-terraform-run

autenticate-oci:
  stage: check-infra
  image: oraclelinux:8-slim
  tags:
    - runner1
  before_script:
    - mkdir -p $HOME/.oci
    - |
      echo "$OCI_CONFIG_BASE64" | base64 -d > $HOME/.oci/config
      echo "$OCI_PRIVATE_KEY_BASE64" | base64 -d > $HOME/.oci/oci_api_key.pem"
    - touch $HOME/.oci/config
    - chmod 600 $HOME/.oci/config
    - chmod 600 $HOME/.oci/oci_api_key.pem
  script:
    - |
      oci iam user get --user-id $(oci iam user list --query "data[?\"name\"=='yohrannes@gmail.com'].id | [0]" --raw-output) --region $OCI_REGION

