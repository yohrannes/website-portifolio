---
include:
  - local: 'pipelines/gitlab-ci-cd/terraform/trigger-run.yml'
  - local: 'pipelines/gitlab-ci-cd/terraform/apply.yml'
  - local: 'pipelines/gitlab-ci-cd/cloud-auth/oci-oke-auth.yml'

variables:
  TF_WORKSPACE: "webapp_prod"
  TF_TARGET_ADDRS: 'module.webapp'

trigger-terraform-run:
# when: manual
  stage: tf-run
  extends:
    - .trigger-terraform-run

terraform-apply:
#  when: manual
  stage: tf-apply
  variables:
    APPLY_TIMEOUT: 8000
  extends:
    - .terraform-apply
  needs:
    - trigger-terraform-run

get-webapp-cluster-id:
  stage: check-infra
  before_script:
    - |
      WORKSPACE_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_WORKSPACE" \
        | jq -r '.data.id')

    - |
      STATE_VERSION_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_WORKSPACE" \
        | jq -r '.data.relationships["current-state-version"].data.id')
  script:
    - |
      WEBAPP_CLUSTER_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/state-versions/$STATE_VERSION_ID/outputs" \
        | jq -r '.data[] | select(.attributes.name == "webapp_cluster_id") | .attributes.value')

      RESPONSE=$(curl -s --write-out "\n%{http_code}" \
        --header "PRIVATE-TOKEN: $GL_TOKEN_VARS_ADMIN" \
        --request PUT \
        --form "value=$WEBAPP_CLUSTER_IP" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/PROD_WEBAPP_CLUSTER_ID") >  /dev/null 2>&1

oci-oke-auth:
  extends: .oci-oke-auth
  needs:
    - get-webapp-cluster-id

### check if this two jobs (install-gateway, set-lb-shape) are de-sincronizing terraform destroy process, changing the infrastructure whithout update the tfstate...

# before destroy process, be sure the gateway api are deleted and load balancer are in a good state to be destroyed.

##    for more info check README.md at cluster module folder.
##

install-gateway:
  tags:
    - runner2
  needs:
    - oci-oke-auth
  extends: .oci-oke-auth
  script:
    - |
      k kustomize "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v1.6.2" 2>/dev/null | k apply -f -
      k apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/crds.yaml
      k apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/default/deploy.yaml
    
    - |
      WEBAPP_CLUSTER_IP=$(k get svc -n nginx-gateway -o json | jq -r '.items[0].status.loadBalancer.ingress[0].ip')

      RESPONSE=$(curl -s --write-out "\n%{http_code}" \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --request PUT \
        --form "value=$WEBAPP_CLUSTER_ID" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/PROD_WEBAPP_CLUSTER_IP") >  /dev/null 2>&1


set-lb-shape: # This job doesn't works imediately after the cluster creation, it needs to be run manually. Implement a check to ensure the load balancer is ready to be updated.
  when: manual
  needs:
    - install-gateway
  stage: check-infra
  script:
    - |
      export COMPARTMENT_ID=$(terraform output oci_oke_cluster_arm_compartment_id | sed 's/"//g')
      export LOAD_BALANCER_ID=$(oci lb load-balancer list --compartment-id \$COMPARTMENT_ID | jq '.data[0].id' | sed 's/"//g')
      OUTPUT=\$(oci lb load-balancer update-load-balancer-shape --load-balancer-id $LOAD_BALANCER_ID --shape-name flexible --shape-details '{"maximum-bandwidth-in-mbps":10,"minimum-bandwidth-in-mbps":10}' --force 2>&1)
      EXIT_CODE=$?
      if [ $EXIT_CODE -ne 0 ] && echo "$OUTPUT" | grep -q 'same values'; then
          echo "No changes made, the load balancer is already using the specified shape and bandwidth."
          exit 0
      elif [ $EXIT_CODE -ne 0 ]; then
          echo "$OUTPUT"
          exit 1
      fi


