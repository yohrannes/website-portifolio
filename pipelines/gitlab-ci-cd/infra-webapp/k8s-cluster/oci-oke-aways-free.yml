---
include:
  - local: 'pipelines/gitlab-ci-cd/terraform/trigger-run.yml'
  - local: 'pipelines/gitlab-ci-cd/terraform/apply.yml'
  - local: 'pipelines/gitlab-ci-cd/terraform/get-output.yml'
  - local: 'pipelines/gitlab-ci-cd/cloud-auth/oci-oke-auth.yml'

variables:
  TF_WORKSPACE: "webapp_prod"
  TF_TARGET_ADDRS: 'module.webapp'

trigger-terraform-run:
#  when: manual
  stage: tf-run
  extends:
    - .trigger-terraform-run

terraform-apply:
#  when: manual
  stage: tf-apply
  variables:
    APPLY_TIMEOUT: 8000
    PLAN_TIMEOUT: 8000
  extends:
    - .terraform-apply
  needs:
    - trigger-terraform-run

get-webapp-cluster-id:
  stage: check-infra
  needs:
    - terraform-apply
  before_script:
    - |
      WORKSPACE_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_WORKSPACE" \
        | jq -r '.data.id')

    - |
      STATE_VERSION_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_WORKSPACE" \
        | jq -r '.data.relationships["current-state-version"].data.id')
  script:
    - |
      WEBAPP_CLUSTER_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/state-versions/$STATE_VERSION_ID/outputs" \
        | jq -r '.data[] | select(.attributes.name == "webapp_cluster_id") | .attributes.value')

      RESPONSE=$(curl -s --write-out "\n%{http_code}" \
        --header "PRIVATE-TOKEN: $GL_TOKEN_VARS_ADMIN" \
        --request PUT \
        --form "value=$WEBAPP_CLUSTER_ID" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/PROD_WEBAPP_CLUSTER_ID") >  /dev/null 2>&1

oci-oke-auth:
  tags:
    - runner2
  stage: check-infra
  extends: .oci-oke-auth
  needs:
    - get-webapp-cluster-id


install-gateway:
  tags:
    - runner2
  stage: check-infra
  needs:
    - oci-oke-auth
  when: manual
  extends: .oci-oke-auth
  script:
    - |
      kubectl kustomize "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v1.6.2" 2>/dev/null | kubectl apply -f -
      kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/crds.yaml
      kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/default/deploy.yaml

install-cert-manager:
  stage: check-infra
  needs:
    - install-gateway
    - oci-oke-auth
  when: manual
  tags:
    - runner2
  extends: .oci-oke-auth
  script:
    - |
      helm repo add jetstack https://charts.jetstack.io
      helm repo update
      helm upgrade --install cert-manager jetstack/cert-manager \
        --namespace cert-manager \
        --create-namespace \
        --version 1.19.2 \
        --set config.apiVersion="controller.config.cert-manager.io/v1alpha1" \
        --set config.kind="ControllerConfiguration" \
        --set config.enableGatewayAPI=true \
        --set crds.enabled=true

get-cluster-ip:
  tags:
    - runner2
  stage: check-infra
  needs:
    - oci-oke-auth
  extends: .oci-oke-auth
  script:
    - |
      WEBAPP_CLUSTER_IP=$(kubectl get svc -n nginx-gateway -o json | jq -r '.items[0].status.loadBalancer.ingress[0].ip')

      RESPONSE=$(curl -s --write-out "\n%{http_code}" \
        --header "PRIVATE-TOKEN: $GL_TOKEN_VARS_ADMIN" \
        --request PUT \
        --form "value=$WEBAPP_CLUSTER_IP" \
        "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/variables/PROD_WEBAPP_CLUSTER_IP") >  /dev/null 2>&1


####################
### implement this using terraform, or garant that gateway-api will be destroyed before the cluster.
##    for more info check README.md at cluster module folder.
pre-destroy:
#  when: manual
  stage: check-infra
  variables:
    OUTPUT_NAME: "webapp_compartment_id"
  tags:
    - runner2
  needs:
    - oci-oke-auth
  extends:
    - .oci-oke-auth
    - .get-output
  script:
  ## Gateway
    - |
      kubectl delete -f\
       https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/default/deploy.yaml || true
    - |
      kubectl delete -f\
       https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/crds.yaml || true
    - |
      kubectl kustomize -f\
       "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v1.6.2" 2>/dev/null | kubectl delete -f - || true
  ## Check LB deletion
#      export COMPARTMENT_ID=$(terraform output oci_oke_cluster_arm_compartment_id | sed 's/"//g')
    - |
      COMPARTMENT_ID=$OUTPUT
    - echo "DEBUG - COMPARTMENT_ID vale ${COMPARTMENT_ID}" >> /tmp/pre-destroy-debug.log
    - oci lb load-balancer list --compartment-id "${COMPARTMENT_ID}" >> /tmp/pre-destroy-debug.log || true
    - oci lb load-balancer list --compartment-id $COMPARTMENT_ID || true
  ## Cert manager
    - helm uninstall cert-manager --namespace cert-manager || true
    - kubectl delete namespace cert-manager --wait=true || true
    - kubectl get crd | grep cert-manager | awk '{print $1}' | xargs kubectl delete crd || true

