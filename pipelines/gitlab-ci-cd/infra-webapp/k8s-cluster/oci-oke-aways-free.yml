---
include:
  - local: 'pipelines/gitlab-ci-cd/terraform/trigger-run.yml'
  - local: 'pipelines/gitlab-ci-cd/terraform/apply.yml'

variables:
  TF_WORKSPACE: "webapp_prod"
  TF_TARGET_ADDRS: 'module.webapp'

trigger-terraform-run:
  when: manual
  stage: tf-run
  extends:
    - .trigger-terraform-run

terraform-apply:
  when: manual
  stage: tf-apply
  extends: .terraform-apply
  needs:
    - trigger-terraform-run

get-webapp-compartment:
  stage: check-infra
  before_script:
    - |
      WORKSPACE_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_CLOUD_WORKSPACE" \
        | jq -r '.data[0].id')

    - |
      STATE_VERSION_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/organizations/$TF_CLOUD_ORG/workspaces/$TF_CLOUD_WORKSPACE" \
        | jq -r '.data[0].relationships["current-state-version"].data.id')
  script:
    - |
      WEBAPP_COMPARTMENT_ID=$(curl -s \
        --header "Authorization: Bearer $TF_CLOUD_TOKEN" \
        --header "Content-Type: application/vnd.api+json" \
        "https://app.terraform.io/api/v2/state-versions/$STATE_VERSION_ID/outputs" \
        | jq -r '.data[] | select(.attributes.name == "webapp_compartment_id") | .attributes.value')
      echo "$WEBAPP_COMPARTMENT_ID" > webapp_compartment_id.txt
  artifacts:
    paths:
      - webapp_compartment_id.txt
    expire_in: 1 hour

oci-oke-auth:
  stage: check-infra
  needs:
    - get-webapp-compartment
  tags:
    - runner1
  before_script:
    - export WEBAPP_COMPARTMENT_ID=$(cat webapp_compartment_id.txt)
    - docker pull ghcr.io/oracle/oci-cli:latest
    - docker tag ghcr.io/oracle/oci-cli:latest oci
    - export OCI_CONFIG="$(echo $OCI_CONFIG_BASE64 | base64 -d)"
    - export OCI_PRIVATE_KEY="$(echo $OCI_PRIVATE_KEY_BASE64 | base64 -d)"
    - |
      oci() {
        docker run --rm -i \
          -e OCI_CONFIG="$OCI_CONFIG" \
          -e OCI_PRIVATE_KEY="$OCI_PRIVATE_KEY" \
          -e OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True \
          --entrypoint /bin/sh \
          oci \
          -c "mkdir -p ~/.oci && \
              mkdir -p ~/.kube && \
              echo \"\$OCI_CONFIG\" > ~/.oci/config && \
              echo \"\$OCI_PRIVATE_KEY\" > ~/.oci/oci_api_key.pem && \
              chmod 600 ~/.oci/oci_api_key.pem && \
              exec oci \"\$@\"" -- "$@"
      }
    - |
      k() {
        docker run --rm -i \
          -e OCI_CONFIG="$OCI_CONFIG" \
          -e OCI_PRIVATE_KEY="$OCI_PRIVATE_KEY" \
          -e OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True \
          -v "$HOME/.kube:/oracle/.kube:rw" \
          -v "/usr/local/bin/kubectl:/usr/local/bin/kubectl:ro" \
          --entrypoint /bin/sh \
          oci \
          -c "mkdir -p ~/.oci && \
              echo \"\$OCI_CONFIG\" > ~/.oci/config && \
              echo \"\$OCI_PRIVATE_KEY\" > ~/.oci/oci_api_key.pem && \
              chmod 600 ~/.oci/oci_api_key.pem && \
              exec /usr/local/bin/kubectl \"\$@\"" -- "$@"
      }
# Check oci authentication
#    - |
#      oci iam user get \
#        --user-id $(oci iam user list \
#        --query "data[0].id" \
#        --raw-output) | jq -r .data.name
    - |
      CLUSTER_ID=$(oci ce cluster list \
        --compartment-id "$WEBAPP_COMPARTMENT_ID" \
        --query "data[0].id" --raw-output)
#    - |
#      mkdir -p ~/.kube
#      touch ~/.kube/config
#      chmod 777 ~/.kube
#      chmod 777 ~/.kube/config
#      cat <<EOF > ~/.kube/config
#      apiVersion: v1
#      kind: Config
#      clusters: []
#      users: []
#      contexts: []
#      EOF
 
  script:
    - |
      oci ce cluster create-kubeconfig \
      --cluster-id $CLUSTER_ID \
      --file /oracle/.kube/config \
      --token-version 2.0.0 \
      --kube-endpoint PUBLIC_ENDPOINT \
      --profile DEFAULT
    - k cluster-info
#    - |
#      chown -R gitlab-runner: ~/.kube/
#    - chmod 600 ~/.kube/config
#    - chmod 700 ~/.kube

